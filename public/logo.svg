<svg width="400" height="120" viewBox="0 0 400 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- TALKMATE LOGO — LIGHT BACKGROUND VERSION -->
  <!-- Brand colours: Orange #E8622A | Blue #1565C0 | Blue Light #4A9FE8 | Navy #061322 -->

  <!-- T Tile -->
  <rect width="120" height="120" rx="22" fill="#E8622A"/>
  <!-- T crossbar -->
  <rect x="18" y="20" width="84" height="18" fill="white"/>
  <!-- T stem -->
  <rect x="51" y="20" width="18" height="62" fill="white"/>
  <!-- Signal arc 3 — largest, most faded -->
  <path d="M 108 78 A 30 30 0 0 0 78 108" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.3"/>
  <!-- Signal arc 2 — medium -->
  <path d="M 108 88 A 20 20 0 0 0 88 108" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <!-- Signal arc 1 — smallest, most opaque -->
  <path d="M 108 98 A 10 10 0 0 0 98 108" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" opacity="1"/>
  <!-- Origin dot -->
  <circle cx="108" cy="108" r="4.5" fill="white"/>

  <!-- Vertical divider -->
  <rect x="140" y="16" width="1.5" height="88" fill="#E8622A" opacity="0.45"/>

  <!-- Wordmark: talk -->
  <text x="158" y="78" font-family="'Outfit', sans-serif" font-size="52" font-weight="800" fill="#061322" letter-spacing="-2">Talk</text>
  <!-- Wordmark: mate -->
  <text x="160" y="108" font-family="'Outfit', sans-serif" font-size="26" font-weight="300" fill="#1565C0" letter-spacing="4">Mate</text>
</svg>
